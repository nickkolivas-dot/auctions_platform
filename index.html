<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Πλειστηριασμοί · Auction Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12232e; --ink2:#1b3341; --paper:#f6f4ef; --card:#ffffff;
  --line:#dcd8ce; --muted:#6c7a82; --sea:#0e7c86; --sea-d:#0a5960;
  --gold:#c8862a; --gold-bg:#fbf1dd; --red:#a4402f;
  --land:#5b8c3e; --resi:#0e7c86; --comm:#8a5cc4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.4}
.mono{font-family:'IBM Plex Mono',monospace}
header{background:var(--ink);color:#eef1ef;padding:16px 22px;display:flex;
  align-items:baseline;gap:18px;flex-wrap:wrap;position:sticky;top:0;z-index:20;
  border-bottom:3px solid var(--gold)}
header h1{font-family:'Fraunces',serif;font-weight:600;font-size:22px;letter-spacing:-.01em}
header h1 span{color:var(--gold)}
.stat{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#9fb2b8}
.stat b{color:#fff;font-size:15px}
.stat .new{color:var(--gold)}
.wrap{display:grid;grid-template-columns:248px 1fr;gap:0;align-items:start}
aside{position:sticky;top:74px;padding:20px 18px;border-right:1px solid var(--line);
  height:calc(100vh - 74px);overflow:auto}
aside h2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
  margin:18px 0 8px;font-weight:600}
aside h2:first-child{margin-top:0}
.chk{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:14px}
.chk input{accent-color:var(--sea);width:15px;height:15px}
.dot{width:9px;height:9px;border-radius:2px;display:inline-block}
input[type=text],input[type=number],select{width:100%;padding:7px 9px;border:1px solid var(--line);
  border-radius:6px;font:inherit;font-size:13.5px;background:#fff;color:var(--ink)}
.row2{display:flex;gap:8px}
.toggle{display:flex;align-items:center;gap:8px;background:var(--gold-bg);
  border:1px solid #e7cd9a;border-radius:8px;padding:9px 10px;cursor:pointer;font-size:13.5px;font-weight:500}
.toggle input{accent-color:var(--gold)}
button.reset{width:100%;margin-top:16px;padding:8px;background:none;border:1px solid var(--line);
  border-radius:6px;font:inherit;font-size:13px;color:var(--muted);cursor:pointer}
button.reset:hover{border-color:var(--ink);color:var(--ink)}
main{padding:18px 22px 60px}
.bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.count{font-family:'Fraunces',serif;font-size:19px;font-weight:600}
.count small{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);font-weight:400}
.sortsel{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
.sortsel select{width:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden;
  display:flex;flex-direction:column;transition:.14s;text-decoration:none;color:inherit}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(18,35,46,.11);border-color:#c3bdb0}
.thumb{aspect-ratio:16/10;background:#e9e5db center/cover no-repeat;position:relative}
.badge{position:absolute;top:9px;left:9px;background:var(--gold);color:#2a1c05;
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:3px 7px;
  border-radius:4px;letter-spacing:.05em}
.tpill{position:absolute;top:9px;right:9px;font-size:10.5px;font-weight:600;padding:3px 8px;
  border-radius:20px;color:#fff;letter-spacing:.02em}
.cbody{padding:12px 13px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
.title{font-size:14px;font-weight:500;line-height:1.32;min-height:37px}
.price{font-family:'Fraunces',serif;font-size:21px;font-weight:600;color:var(--ink)}
.drop{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:700;color:var(--red)}
.facts{display:flex;flex-wrap:wrap;gap:5px 12px;font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;color:var(--muted);margin-top:auto}
.facts b{color:var(--ink2);font-weight:500}
.loc{font-size:12.5px;color:var(--sea-d);font-weight:500}
.date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red)}
.empty{padding:70px 20px;text-align:center;color:var(--muted)}
.empty b{display:block;font-family:'Fraunces',serif;font-size:20px;color:var(--ink);margin-bottom:6px}
@media(max-width:760px){.wrap{grid-template-columns:1fr}aside{position:static;height:auto;
  border-right:none;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<header>
  <h1>Πλειστηριασμοί<span>·</span>Auction Monitor</h1>
  <div class="stat">Listings <b id="s-total">—</b></div>
  <div class="stat">New this run <b class="new" id="s-new">—</b></div>
  <div class="stat">Price cuts <b id="s-drops" style="color:var(--red)">—</b></div>
  <div class="stat">Updated <b id="s-run" style="font-size:12.5px">—</b></div>
  <div class="stat" style="margin-left:auto;color:#6f8188">source: eauction24.gr</div>
</header>

<div class="wrap">
<aside>
  <h2>Only new</h2>
  <label class="toggle"><input type="checkbox" id="f-new"> Show only newly-listed</label>
  <label class="toggle" style="margin-top:8px"><input type="checkbox" id="f-drop"> Only price-reduced (re-auctions)</label>

  <h2>Property type</h2>
  <label class="chk"><input type="checkbox" class="f-type" value="Residential" checked><span class="dot" style="background:var(--resi)"></span>Residential</label>
  <label class="chk"><input type="checkbox" class="f-type" value="Land" checked><span class="dot" style="background:var(--land)"></span>Land / plots</label>
  <label class="chk"><input type="checkbox" class="f-type" value="Commercial" checked><span class="dot" style="background:var(--comm)"></span>Commercial</label>
  <label class="chk"><input type="checkbox" class="f-type" value="Other" checked><span class="dot" style="background:#9aa5ab"></span>Other</label>

  <h2>Region</h2>
  <select id="f-region"><option value="">All regions</option></select>

  <h2>Municipality</h2>
  <select id="f-muni"><option value="">All municipalities</option></select>

  <h2>Address / locality search</h2>
  <input type="text" id="f-loc" placeholder="e.g. Γλυφάδας, Πάτρα…">

  <h2>Price (€)</h2>
  <div class="row2"><input type="number" id="f-pmin" placeholder="min"><input type="number" id="f-pmax" placeholder="max"></div>

  <h2>Size (m²)</h2>
  <div class="row2"><input type="number" id="f-amin" placeholder="min"><input type="number" id="f-amax" placeholder="max"></div>

  <button class="reset" id="reset">Reset all filters</button>
</aside>

<main>
  <div class="bar">
    <div class="count"><span id="c-shown">0</span> results <small id="c-of"></small></div>
    <div class="sortsel">Sort
      <select id="sort">
        <option value="new">Newly listed first</option>
        <option value="date">Auction date (soonest)</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
        <option value="area-desc">Size ↓</option>
      </select>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</main>
</div>

δύο κύρια δωμάτια, κουζίνα, λουτρό, οφφίς και ιδιόκτητα τμήματα εξωστών προς το ακάλυπτο του οικοπέδου. Η πολυκατοικία είναι κατασκευής περίπου 1974 και βρίσκεται σε μέτρια κατάσταση συντήρησης.","first_seen":"2026-07-05"},{"id":6964,"url":"https://eauction24.gr/auction/6964","title":"Κατοικία 84 τ.μ. Δήμος Ιλίου σε πλειστηριασμό","type":"Residential","raw_type":"Residence","area_m2":84,"price_eur":58500,"auction_date":"2026-07-08","region":"Αττικής","municipality":"Ιλίου","address":"οδός Ανδρομάχης αρ. 33, Ίλιον (Νέα Λιόσια), Αττική","bedrooms":2,"image":"https://eauction24.gr/storage/images/eauction/2fxyotjwml.jpg","description":"Διαμέρισμα ισογείου σε πολυκατοικία εντός οικοπέδου στο Ίλιον, με πρόσοψη στις οδούς Εκάβης και Αλ. Παναγούλη και ανεξάρτητη είσοδο. Αποτελείται από ενιαίο χώρο χωλ-σαλόνι-τραπεζαρία, κουζίνα, διάδρομο, ένα λουτρό, ένα WC, δύο υπνοδωμάτια και δύο μπαζωμένους εξώστες προς τον ακάλυπτο χώρο. Έχει επιφάνεια 84 τ.μ. και ύψος 3,10 μ.","first_seen":"2026-07-05"},{"id":6963,"url":"https://eauction24.gr/auction/6963","title":"Κατοικία 32.50 τ.μ. Δήμος Κορινθίων σε πλειστηριασμό","type":"Residential","raw_type":"Residence","area_m2":32.5,"price_eur":38000,"auction_date":"2026-07-08","region":"Πελοποννήσου","municipality":"Κορινθίων","address":"Εθνικής Ανεξαρτησίας 17-19, Κόρινθος","bedrooms":null,"image":"https://eauction24.gr/storage/images/eauction/kmb6f43ffh.jpg","description":"Διαμέρισμα 4ου ορόφου σε πολυκατοικία στην Κόρινθο, με συνολική επιφάνεια 32,50 τ.μ. Αποτελείται από ένα κύριο δωμάτιο, χολ, κουζίνα και λουτρό. Η οικοδομή είναι κατασκευασμένη με φέροντα οργανισμό από οπλισμένο σκυρόδεμα και τοιχοποιίες από οπτοπλινθοδομή, με εκτιμώμενο έτος αποπεράτωσης το 1975.","first_seen":"2026-07-05"},{"id":6959,"url":"https://eauction24.gr/auction/6959","title":"Αγροτεμάχιο 288.10 τ.μ. Δήμος Κρωπίας σε πλειστηριασμό","type":"Land","raw_type":"Residence","area_m2":288.1,"price_eur":54000,"auction_date":"2026-07-08","region":"Αττικής","municipality":"Κρωπίας","address":"θέση Καρέλλα της κτηματικής περιφέρειας του Δήμου Κρωπίας, Ανατολικής Αττικής","bedrooms":null,"image":"https://eauction24.gr/storage/images/eauction/mlu4rdfq4a.jpg","description":"Αγροτεμάχιο εκτός σχεδίου πόλεως και εκτός ζώνης, σε απόσταση περίπου 400 μέτρων από τη λεωφόρο. Έχει εμβαδόν 288,10 τ.μ. και συνορεύει βόρεια με ιδιωτική οδό, νότια με το αγροτεμάχιο 35, ανατολικά με ιδιωτική οδό και δυτικά με το αγροτεμάχιο 38.","first_seen":"2026-07-05"}];</script>
<script>
const TCOLOR={Residential:'var(--resi)',Land:'var(--land)',Commercial:'var(--comm)',Other:'#9aa5ab'};
const fmt=n=>n==null?'—':'€'+Number(n).toLocaleString('el-GR');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let DATA=[], LATEST=null, DROPS=new Map(), MUNIS_BY_REGION=new Map();

function populateMuni(region){
  const sel=document.getElementById('f-muni');
  const keep=sel.value;
  sel.innerHTML='<option value="">All municipalities</option>';
  const list=region?(MUNIS_BY_REGION.get(region)||[]):[...new Set(DATA.map(d=>d.municipality).filter(Boolean))].sort();
  list.forEach(m=>sel.insertAdjacentHTML('beforeend',`<option>${esc(m)}</option>`));
  sel.value=list.includes(keep)?keep:'';
}

function applyParamsFromURL(){
  const p=new URLSearchParams(location.search);
  if(p.has('region'))document.getElementById('f-region').value=p.get('region');
  populateMuni(document.getElementById('f-region').value);
  if(p.has('muni'))document.getElementById('f-muni').value=p.get('muni');
  if(p.has('loc'))document.getElementById('f-loc').value=p.get('loc');
  if(p.has('pmin'))document.getElementById('f-pmin').value=p.get('pmin');
  if(p.has('pmax'))document.getElementById('f-pmax').value=p.get('pmax');
  if(p.has('amin'))document.getElementById('f-amin').value=p.get('amin');
  if(p.has('amax'))document.getElementById('f-amax').value=p.get('amax');
  if(p.has('type')){
    const types=new Set(p.get('type').split(','));
    document.querySelectorAll('.f-type').forEach(c=>c.checked=types.has(c.value));
  }
  if(p.get('new')==='1')document.getElementById('f-new').checked=true;
  if(p.get('drop')==='1')document.getElementById('f-drop').checked=true;
  if(p.has('sort'))document.getElementById('sort').value=p.get('sort');
}

async function boot(){
  try{
    const r=await fetch('./data/auctions.json',{cache:'no-store'});
    if(!r.ok) throw 0;
    DATA=await r.json();
    try{const m=await(await fetch('./data/meta.json',{cache:'no-store'})).json();
      document.getElementById('s-run').textContent=(m.last_run||'').replace('T',' ').slice(0,16);}catch(e){}
    try{
      const drops=await(await fetch('./data/drops.json',{cache:'no-store'})).json();
      drops.filter(x=>x.has_drop).forEach(x=>DROPS.set(x.latest_id,x.drop_pct));
    }catch(e){}
  }catch(e){
    DATA=window.__SEED__||[];
    document.getElementById('s-run').textContent='seed sample';
  }
  DATA=DATA.filter(d=>d.status!=='removed');
  LATEST=DATA.map(d=>d.first_seen).filter(Boolean).sort().pop();
  const newCount=DATA.filter(d=>d.first_seen===LATEST).length;
  document.getElementById('s-total').textContent=DATA.length;
  document.getElementById('s-new').textContent=newCount;
  document.getElementById('s-drops').textContent=DROPS.size;
  const rsel=document.getElementById('f-region');
  [...new Set(DATA.map(d=>d.region).filter(Boolean))].sort()
    .forEach(r=>rsel.insertAdjacentHTML('beforeend',`<option>${esc(r)}</option>`));
  DATA.forEach(d=>{
    if(!d.region||!d.municipality)return;
    if(!MUNIS_BY_REGION.has(d.region))MUNIS_BY_REGION.set(d.region,new Set());
    MUNIS_BY_REGION.get(d.region).add(d.municipality);
  });
  MUNIS_BY_REGION.forEach((set,region)=>MUNIS_BY_REGION.set(region,[...set].sort()));
  populateMuni('');
  applyParamsFromURL();
  render();
}

function current(){
  const types=[...document.querySelectorAll('.f-type:checked')].map(c=>c.value);
  const reg=document.getElementById('f-region').value;
  const muni=document.getElementById('f-muni').value;
  const loc=document.getElementById('f-loc').value.trim().toLowerCase();
  const pmin=+document.getElementById('f-pmin').value||0;
  const pmax=+document.getElementById('f-pmax').value||Infinity;
  const amin=+document.getElementById('f-amin').value||0;
  const amax=+document.getElementById('f-amax').value||Infinity;
  const onlyNew=document.getElementById('f-new').checked;
  const onlyDrop=document.getElementById('f-drop').checked;
  let out=DATA.filter(d=>{
    if(!types.includes(d.type))return false;
    if(reg&&d.region!==reg)return false;
    if(muni&&d.municipality!==muni)return false;
    if(onlyNew&&d.first_seen!==LATEST)return false;
    if(onlyDrop&&!DROPS.has(d.id))return false;
    if(loc){const h=((d.municipality||'')+' '+(d.address||'')+' '+(d.title||'')).toLowerCase();
      if(!h.includes(loc))return false;}
    const p=d.price_eur??-1, a=d.area_m2??-1;
    if(p>=0&&(p<pmin||p>pmax))return false;
    if((amin>0||amax<Infinity)&&(a<amin||a>amax))return false;
    return true;
  });
  const s=document.getElementById('sort').value;
  const by={
    'new':(a,b)=>(b.first_seen||'').localeCompare(a.first_seen||'')||b.id-a.id,
    'date':(a,b)=>(a.auction_date||'9').localeCompare(b.auction_date||'9'),
    'price-asc':(a,b)=>(a.price_eur??1e15)-(b.price_eur??1e15),
    'price-desc':(a,b)=>(b.price_eur??-1)-(a.price_eur??-1),
    'area-desc':(a,b)=>(b.area_m2??-1)-(a.area_m2??-1),
  }[s];
  return out.sort(by);
}

function render(){
  const rows=current();
  document.getElementById('c-shown').textContent=rows.length;
  document.getElementById('c-of').textContent='of '+DATA.length+' total · full set, no cap';
  const g=document.getElementById('grid');
  if(!rows.length){g.innerHTML='<div class="empty"><b>No matches</b>Widen the price or size range, or clear the location filter.</div>';return;}
  g.innerHTML=rows.map(d=>{
    const isNew=d.first_seen===LATEST;
    const drop=DROPS.get(d.id);
    const img=d.image?`background-image:url('${esc(d.image)}')`:'';
    return `<a class="card" href="${esc(d.url)}" target="_blank" rel="noopener">
      <div class="thumb" style="${img}">
        ${isNew?'<span class="badge">NEW</span>':''}
        <span class="tpill" style="background:${TCOLOR[d.type]}">${esc(d.type)}</span>
      </div>
      <div class="cbody">
        <div class="title">${esc(d.title)||'—'}</div>
        <div class="price">${fmt(d.price_eur)}</div>
        ${drop?`<div class="drop">🔻 −${drop}% vs prior round</div>`:''}
        <div class="loc">${esc([d.municipality,d.region].filter(Boolean).join(' · '))}</div>
        <div class="facts">
          ${d.area_m2?`<span><b>${d.area_m2}</b> m²</span>`:''}
          ${d.bedrooms?`<span><b>${d.bedrooms}</b> bd</span>`:''}
          ${d.auction_date?`<span class="date">⚖ ${esc(d.auction_date)}</span>`:''}
        </div>
      </div></a>`;
  }).join('');
}

document.getElementById('f-region').addEventListener('change',e=>{populateMuni(e.target.value);render();});
document.addEventListener('input',e=>{if(e.target.closest('aside')||e.target.id==='sort')render();});
document.getElementById('reset').onclick=()=>{
  document.querySelectorAll('.f-type').forEach(c=>c.checked=true);
  document.getElementById('f-new').checked=false;
  document.getElementById('f-drop').checked=false;
  ['f-region','f-loc','f-pmin','f-pmax','f-amin','f-amax'].forEach(id=>document.getElementById(id).value='');
  populateMuni('');
  document.getElementById('f-muni').value='';
  render();
};
boot();
</script>
</body>
</html>
