name: diag-openai
# throwaway diagnostic: reproduces notify.py's OpenAI call to surface the real
# 400 reason. Prints only HTTP status + response body (OpenAI error bodies do
# not contain the key; GitHub also masks secrets in logs). Delete after use.
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests
      - name: probe OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import os, json, requests
          key = os.environ["OPENAI_API_KEY"]
          H = {"Authorization": f"Bearer {key}", "content-type": "application/json"}
          def show(label, body):
              r = requests.post("https://api.openai.com/v1/chat/completions", headers=H, json=body, timeout=60)
              print(f"\n===== {label} =====")
              print("status:", r.status_code)
              print("body:", r.text[:700])
          # 1) does the account reach chat/completions at all, cheapest model, no tools?
          show("luna minimal", {"model":"gpt-5.6-luna","messages":[{"role":"user","content":"say hi"}]})
          # 2) same with the tools+tool_choice shape notify.py uses
          show("luna + tools", {"model":"gpt-5.6-luna",
              "messages":[{"role":"user","content":"call the tool"}],
              "tools":[{"type":"function","function":{"name":"t","description":"d",
                        "parameters":{"type":"object","properties":{"x":{"type":"string"}},"required":["x"]}}}],
              "tool_choice":{"type":"function","function":{"name":"t"}}})
          # 3) the originally-defaulted model, minimal -- is it an access thing?
          show("sol minimal", {"model":"gpt-5.6-sol","messages":[{"role":"user","content":"say hi"}]})
          # 4) list a few models the key CAN see
          m = requests.get("https://api.openai.com/v1/models", headers=H, timeout=60)
          print("\n===== /v1/models (status", m.status_code, ") =====")
          if m.status_code == 200:
              ids = sorted(d["id"] for d in m.json().get("data", []))
              print("count:", len(ids))
              print("gpt-5/chat-ish:", [i for i in ids if i.startswith(("gpt-5","gpt-4"))][:40])
          else:
              print(m.text[:500])
          PY
