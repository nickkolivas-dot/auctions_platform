name: diag-openai
# throwaway diagnostic: reproduces notify.py's OpenAI call to surface the real
# 400 reason. Prints only HTTP status + response body (OpenAI error bodies do
# not contain the key; GitHub also masks secrets in logs). Delete after use.
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests
      - name: probe OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import os, json, requests
          key = os.environ["OPENAI_API_KEY"]
          H = {"Authorization": f"Bearer {key}", "content-type": "application/json"}
          def show(label, body):
              r = requests.post("https://api.openai.com/v1/chat/completions", headers=H, json=body, timeout=60)
              print(f"\n===== {label} =====")
              print("status:", r.status_code)
              print("body:", r.text[:700])
          TOOLS = [{"type":"function","function":{"name":"t","description":"d",
                    "parameters":{"type":"object","properties":{"x":{"type":"string"}},"required":["x"]}}}]
          TC = {"type":"function","function":{"name":"t"}}
          # FIX CANDIDATE A: a non-reasoning model handles function tools natively
          show("gpt-4.1-mini + tools", {"model":"gpt-4.1-mini",
              "messages":[{"role":"user","content":"call the tool with x='hi'"}],
              "tools":TOOLS, "tool_choice":TC})
          # FIX CANDIDATE B: keep gpt-5.6-luna but disable reasoning, as the error suggested
          show("luna + tools + reasoning_effort=none", {"model":"gpt-5.6-luna",
              "messages":[{"role":"user","content":"call the tool with x='hi'"}],
              "tools":TOOLS, "tool_choice":TC, "reasoning_effort":"none"})
          PY
