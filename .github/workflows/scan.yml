name: auction-scan
on:
  schedule:
    - cron: '0 6 * * *'    # 09:00 Athens (summer) — morning scan
    - cron: '0 14 * * *'   # 17:00 Athens (summer) — afternoon scan
  workflow_dispatch: {}     # manual "Run workflow" button
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: scrape all regions
        run: python scraper.py
        env: { MAX_PAGES: '60' }
      - name: link re-auction rounds, flag price cuts
        run: python drop_tracker.py
      - name: email new listings
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          # optional — leave unset to email ALL new listings:
          ALERT_TYPES:     ${{ vars.ALERT_TYPES }}
          ALERT_REGION:    ${{ vars.ALERT_REGION }}
          ALERT_MAX_PRICE: ${{ vars.ALERT_MAX_PRICE }}
          ALERT_LOC:       ${{ vars.ALERT_LOC }}
        run: python notify.py
      - name: commit data
        run: |
          git config user.name  "auction-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "scan $(date -u +%F_%H:%M)"
          git push
