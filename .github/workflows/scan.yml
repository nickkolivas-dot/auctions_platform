name: auction-scan
on:
  schedule:
    # Morning fires (UTC). GitHub delays scheduled runs unpredictably (seen 40min–3h
    # here), so we do NOT gate on an exact clock hour — that skipped every run. Instead
    # the gate is idempotent: the FIRST fire each day sends the digest, later fires that
    # day see it's already sent and skip. Two fires = redundancy if GitHub drops one.
    # 05:00/06:00 UTC ≈ 08:00/09:00 Athens (summer), biased early so a delayed run still
    # lands in the morning.
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:   # manual "send the digest now" — always proceeds
permissions:
  contents: write
jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.g.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - id: g
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch — proceeding"; echo "go=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          TODAY=$(date -u +%F)
          LAST=$(python3 -c "import json,pathlib as p; f=p.Path('data/report_seen.json'); print(json.loads(f.read_text()).get('last_digest_date','') if f.exists() else '')" 2>/dev/null || echo "")
          if [ "$LAST" = "$TODAY" ]; then
            echo "digest already sent today ($TODAY) — skip this fire"; echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "no digest yet today (today=$TODAY, last=$LAST) — proceeding"; echo "go=true" >> "$GITHUB_OUTPUT"
          fi
  scan:
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: scrape all regions
        run: python scraper.py
        env:
          MAX_PAGES: '300'  # Αττικής alone naturally ends at page 155 (verified 2026-07-05); keep headroom
          # hard budget cap: never fetch or store listings priced above this.
          # empty/unset = no cap (full nationwide archive). Change anytime in
          # repo Settings -> Secrets and variables -> Actions -> Variables.
          MAX_PRICE_EUR: ${{ vars.MAX_PRICE_EUR }}
      - name: link re-auction rounds, flag price cuts
        run: python drop_tracker.py
      - name: score price-per-sqm vs local median
        run: python comps.py
      - name: compute walk-away ceilings (max bid per lot)
        run: python walkaway.py
        env:
          # the "don't bid above this" model -- all tunable here without code.
          # leave any unset to use the built-in default.
          WALKAWAY_RESALE_HAIRCUT:   ${{ vars.WALKAWAY_RESALE_HAIRCUT }}   # default 0.90
          WALKAWAY_MARGIN:           ${{ vars.WALKAWAY_MARGIN }}           # default 0.25
          WALKAWAY_RENO_PER_M2:      ${{ vars.WALKAWAY_RENO_PER_M2 }}      # default 350
          WALKAWAY_TXN_COST_PCT:     ${{ vars.WALKAWAY_TXN_COST_PCT }}     # default 0.06
          WALKAWAY_LEGAL_CONTINGENCY: ${{ vars.WALKAWAY_LEGAL_CONTINGENCY }} # default 3000
      - name: send morning digest (Top 10 to act on)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          # optional — leave unset to email ALL new listings:
          ALERT_TYPES:     ${{ vars.ALERT_TYPES }}
          ALERT_REGION:    ${{ vars.ALERT_REGION }}
          ALERT_MAX_PRICE: ${{ vars.ALERT_MAX_PRICE }}
          ALERT_LOC:       ${{ vars.ALERT_LOC }}
          # watchlist: OR-list of area tokens, ";"-separated (region/muni/locality names)
          ALERT_AREAS:     ${{ vars.ALERT_AREAS }}
          # every-morning "Top 10 to act on" digest: ranks the whole active watchlist,
          # splits new/changed vs already-shown via data/report_seen.json
          DAILY_DIGEST:    '1'
          # optional AI curation of the digest -- leave both unset to skip it
          # entirely (falls back to the plain list). OpenAI wins if both are set.
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:      ${{ vars.OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ vars.ANTHROPIC_MODEL }}
          # how many listings can appear in the daily "Top picks" section (default 10)
          TOP_N:             ${{ vars.TOP_N }}
        run: python notify.py
      - name: commit data
        run: |
          git config user.name  "auction-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "scan $(date -u +%F_%H:%M)"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected (remote moved on), rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main -X ours || { git rebase --abort; exit 1; }
            sleep $((i * 5))
          done
          echo "failed to push after retries" >&2
          exit 1
