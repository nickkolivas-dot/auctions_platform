name: auction-scan
on:
  schedule:
    - cron: '0 6 * * *'    # 09:00 Athens (summer) — morning scan
    - cron: '0 14 * * *'   # 17:00 Athens (summer) — afternoon scan
  workflow_dispatch:
    inputs:
      force_email:
        description: "Send an email even if nothing new was found this run (uses the current price-drop list instead)"
        type: boolean
        default: false
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: scrape all regions
        run: python scraper.py
        env:
          MAX_PAGES: '300'  # Αττικής alone naturally ends at page 155 (verified 2026-07-05); keep headroom
          # hard budget cap: never fetch or store listings priced above this.
          # empty/unset = no cap (full nationwide archive). Change anytime in
          # repo Settings -> Secrets and variables -> Actions -> Variables.
          MAX_PRICE_EUR: ${{ vars.MAX_PRICE_EUR }}
      - name: link re-auction rounds, flag price cuts
        run: python drop_tracker.py
      - name: score price-per-sqm vs local median
        run: python comps.py
      - name: email new listings
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          # optional — leave unset to email ALL new listings:
          ALERT_TYPES:     ${{ vars.ALERT_TYPES }}
          ALERT_REGION:    ${{ vars.ALERT_REGION }}
          ALERT_MAX_PRICE: ${{ vars.ALERT_MAX_PRICE }}
          ALERT_LOC:       ${{ vars.ALERT_LOC }}
          FORCE_EMAIL:     ${{ inputs.force_email }}
          # optional AI curation of the digest -- leave both unset to skip it
          # entirely (falls back to the plain list). OpenAI wins if both are set.
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:      ${{ vars.OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ vars.ANTHROPIC_MODEL }}
          # how many listings can appear in the daily "Top picks" section (default 5)
          TOP_N:             ${{ vars.TOP_N }}
        run: python notify.py
      - name: commit data
        run: |
          git config user.name  "auction-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "scan $(date -u +%F_%H:%M)"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected (remote moved on), rebasing onto latest main (attempt $i)"
            git fetch origin main
            git rebase origin/main -X ours || { git rebase --abort; exit 1; }
            sleep $((i * 5))
          done
          echo "failed to push after retries" >&2
          exit 1
